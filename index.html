<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nisa ❤️</title>

<style>
  body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial, sans-serif;
  }

  /* Ortadaki ana yazı */
  #main{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    font-weight:bold;
    text-align:center;
    background:linear-gradient(45deg, red, pink, purple, orange, yellow);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 30px pink; }
  }

  .msg{
    position:absolute;
    font-size:18px;
    pointer-events:none;
    white-space:nowrap;
    animation: float linear infinite;
  }

  @keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(-100vh); }
  }
</style>
</head>

<body>

<div id="main">
  Nisa seni çok seviyorum 😍❤️
</div>

<script>
const text = "Nisa seni çok seviyorum 😍❤️";

for(let i=0;i<999;i++){
  const el = document.createElement("div");
  el.className = "msg";
  el.innerText = text;

  // Rastgele konum
  el.style.left = Math.random()*window.innerWidth + "px";
  el.style.top = Math.random()*window.innerHeight + "px";

  // Rastgele renk
  el.style.color = `hsl(${Math.random()*360}, 100%, 50%)`;

  // Rastgele boyut
  el.style.fontSize = (Math.random()*20 + 14) + "px";

  // Animasyon süresi
  el.style.animationDuration = (Math.random()*5 + 5) + "s";

  document.body.appendChild(el);
}
</script>

</body>
</html>
