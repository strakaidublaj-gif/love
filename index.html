<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Seni Seviyorum</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: monospace;
      color: #0f0;
    }
  </style>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);
const isim = params.get("isim") || "Sen";

function createText() {
  const el = document.createElement("div");
  el.innerText = isim + " seni seviyorum";
  el.style.position = "absolute";
  el.style.left = Math.random() * window.innerWidth + "px";
  el.style.top = "0px";
  document.body.appendChild(el);

  let y = 0;
  const speed = Math.random() * 4 + 2;

  const fall = setInterval(() => {
    y += speed;
    el.style.top = y + "px";

    if (y > window.innerHeight) {
      el.remove();
      clearInterval(fall);
    }
  }, 30);
}

setInterval(createText, 120);
</script>

</body>
</html>
